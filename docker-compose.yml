# /docker-compose.yml

services:
  # --- 后端服务 ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jarvis-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      # 只挂载需要热重载的代码目录，减少 inotify 监控范围
      - ./backend/api:/app/api
      - ./backend/etl:/app/etl
      - ./backend/strategy:/app/strategy
      - ./backend/main.py:/app/main.py
      - ./backend/db:/app/db
      - ./backend/requirements.txt:/app/requirements.txt
    ports:
      - "8000:8000"
    networks:
      - jarvis_net
    env_file:
      - ./backend/.env
    environment:
      - UVICORN_DEFAULT_LOG_LEVEL=info
    # 优化：使用 --reload-include 只监控 Python 文件，减少不必要的文件监控
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-include '*.py' --reload-exclude '__pycache__/*' --reload-exclude '*.pyc' --log-level info

  # --- 前端服务 (开发模式) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build-stage
    container_name: jarvis-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/package.json:/app/package.json
      - /app/node_modules
    ports:
      - "8080:5173"
    depends_on:
      - backend
    networks:
      - jarvis_net
    command: npm run dev -- --host

networks:
  jarvis_net:
    driver: bridge
