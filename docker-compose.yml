# /docker-compose.yml

services:
  # --- 后端服务 ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jarvis-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - jarvis_net
    env_file:
      - ./backend/.env
    environment:
      - UVICORN_DEFAULT_LOG_LEVEL=debug
    # 开发环境使用 --reload 自动发现代码更改
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude 'data/*' --reload-exclude '__pycache__/*' --log-level debug

  # --- 前端服务 (开发模式) ---
  # 注意：如果需要生产环境 Nginx 部署，可以保留原来的 Dockerfile 逻辑
  # 但为了开发效率，这里建议直接运行 Vite 开发服务器
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build-stage # 仅构建到安装依赖阶段
    container_name: jarvis_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules # 匿名卷，防止宿主机 node_modules 覆盖容器内的
    ports:
      - "8080:5173" # Vite 默认端口是 5173
    depends_on:
      - backend
    networks:
      - jarvis_net
    # 覆盖 CMD 使用 Vite 开发服务器
    command: npm run dev -- --host

networks:
  jarvis_net:
    driver: bridge
